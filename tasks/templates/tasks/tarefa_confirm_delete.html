{% extends "base.html" %}

{% block page_title %}
    Excluir tarefa
{% endblock page_title %}

{% block content %}
    <h1>Excluir tarefa</h1>

    <p>Tem certeza que deseja excluir a tarefa " <strong>{{ tarefa.nome }}</strong>"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Excluir</button>
        <a href="{% url 'tarefa_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock content %}
